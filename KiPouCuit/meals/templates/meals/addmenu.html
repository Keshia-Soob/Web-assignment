{% extends 'base.html' %}
{% load static %}

{% block title %}Add Menu Item{% endblock %}

{% block content %}
<link rel="stylesheet" href="{% static 'meals/AddMenuStyle.css' %}">
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>



<div class="container">
  <div class="page-title">
    <h1>Add New Menu Item</h1>
    <p>Share your delicious creation with our community</p>
  </div>

  <div class="form-container">

    <!-- Success banner-->
    <div class="success-message" id="successMessage" style="display:none;">
      <i class="fas fa-check-circle"></i>
      Your menu item has been added successfully!
      <a href="{% url 'menu' %}" style="margin-left:10px;">View Menu</a>
    </div>

    <!-- Error banner -->
    <div class="error-message" id="errorMessage" style="display:none;">
      <ul id="errorList"></ul>
    </div>


    <form id="menuForm" enctype="multipart/form-data">
      {% csrf_token %}

      <div class="form-row">
        <div class="form-group">
          <label for="itemName">Item Name</label>
          <input type="text" id="itemName" name="name" required
                 placeholder="e.g., Butter Chicken">
        </div>

        <div class="form-group">
          <label for="itemPrice">Price (Rs)</label>
          <input type="number" id="itemPrice" name="price" required
                 placeholder="e.g., 650" min="1" step="0.01">
        </div>
      </div>

      <div class="form-group">
        <label for="itemDescription">Description</label>
        <textarea id="itemDescription" name="description" required
                  placeholder="Brief description of your dish..."></textarea>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="itemCuisine">Cuisine Type</label>
          <select id="itemCuisine" name="cuisine" required>
            <option value="">Select Cuisine</option>
            {% for key, label in cuisine_choices %}
              <option value="{{ key }}">{{ label }}</option>
            {% endfor %}
          </select>
        </div>
      </div>

      <div class="form-group">
        <label for="itemImage">Upload Image</label>
        <div class="image-upload">
          <input type="file" id="itemImage" name="image" accept="image/*">
          <label for="itemImage" class="image-upload-label">
            <i class="fas fa-cloud-upload-alt"></i> Click to upload an image
          </label>
        </div>
        <div class="image-preview" id="imagePreview"></div>
      </div>

      <button type="submit" class="submit-btn" id="submitBtn">
        Add Menu Item
      </button>
    </form>
  </div>
</div>

<script>

$(document).ready(function () {


  $("#itemImage").on("change", function () {
    const file = this.files[0];
    if (!file) { $("#imagePreview").empty(); return; }

    const reader = new FileReader();
    reader.onload = function (e) {
      $("#imagePreview").html($("<img>").attr("src", e.target.result));
    };
    reader.readAsDataURL(file);
  });


  function getCookie(name) {
    let value = null;
    if (document.cookie && document.cookie !== '') {
      document.cookie.split(';').forEach(function (c) {
        c = $.trim(c);
        if (c.startsWith(name + '=')) {
          value = decodeURIComponent(c.substring(name.length + 1));
        }
      });
    }
    return value;
  }


  
  $("#menuForm").on("submit", function (e) {
    e.preventDefault();   // stop browser default POST

    $("#successMessage").hide();
    $("#errorMessage").hide().find("#errorList").empty();

    const submitBtn = $("#submitBtn");
    submitBtn.prop("disabled", true).text("Adding…");

   
    const formData = new FormData(this);


    const token = localStorage.getItem("authToken") || "";

    $.ajax({
      url:         "/api/menu/",
      type:        "POST",
      data:        formData,              
      processData: false,                  
      contentType: false,                 
      headers: {
        "X-CSRFToken":  getCookie("csrftoken"),
        // If the user has a token (logged in via Flet / API), include it.
        // If using session auth (browser login), this header is ignored.
        ...(token ? { "Authorization": "Token " + token } : {})
      },


      success: function (data) {

        $("#successMessage").show();
        $("#menuForm")[0].reset();
        $("#imagePreview").empty();

        console.log("New item created via REST API:", data);

      },


      error: function (xhr) {
        let errors = [];

        if (xhr.status === 401) {
          errors = ["You must be logged in to add menu items."];
        } else if (xhr.status === 403) {
          errors = [xhr.responseJSON && xhr.responseJSON.error
            ? xhr.responseJSON.error
            : "Only home cooks can add menu items."];
        } else if (xhr.responseJSON) {

          $.each(xhr.responseJSON, function (field, msgs) {
            if (Array.isArray(msgs)) {
              msgs.forEach(function (m) {
                errors.push(field + ": " + m);
              });
            } else {
              errors.push(msgs);
            }
          });
        } else {
          errors = ["An unexpected error occurred. Please try again."];
        }

        const list = $("#errorList");
        errors.forEach(function (err) {
          list.append($("<li>").text(err));
        });
        $("#errorMessage").show();
      },

      complete: function () {
        submitBtn.prop("disabled", false).text("Add Menu Item");
      }
    });
  });

});
</script>
{% endblock %}
